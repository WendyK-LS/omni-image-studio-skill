name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile scripts
        run: python -m py_compile scripts/omni_image.py scripts/fit_export.py
      - name: Validate presets JSON
        run: python -m json.tool assets/platform_presets.json > /tmp/platform_presets.json
      - name: List presets
        run: python scripts/omni_image.py presets
